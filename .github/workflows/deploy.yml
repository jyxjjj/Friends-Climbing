name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: ${{ secrets.WORKER_NAME }}
      KV_NAMESPACE_TITLE: ${{ secrets.KV_NAMESPACE_TITLE }}
      PREVIEW_KV_NAMESPACE_TITLE: ${{ secrets.PREVIEW_KV_NAMESPACE_TITLE }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      PREVIEW_R2_BUCKET_NAME: ${{ secrets.PREVIEW_R2_BUCKET_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Format check
        run: npm run format:check

      - name: Ensure Cloudflare resources and deploy
        run: node scripts/ensure-cloudflare-resources.mjs
